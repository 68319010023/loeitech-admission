services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    image: ${REGISTRY_URL}/loeitech-backend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - DB_SSL=false
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "${BACKEND_PORT:-13001}:3001"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - db

  frontend:
    image: ${REGISTRY_URL}/loeitech-frontend:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "${FRONTEND_PORT:-13000}:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
  db_data:
