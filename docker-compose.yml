services:
  backend:
    image: ${REGISTRY_URL}/loeitech-backend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - DB_SSL=${DB_SSL:-false}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ${REGISTRY_URL}/loeitech-frontend:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
